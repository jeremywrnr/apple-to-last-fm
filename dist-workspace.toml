[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Target platforms to build apps for (macOS only — depends on macOS-native crates)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Homebrew tap repo where the formula will be published (github.com/jeremywrnr/homebrew-tap)
tap = "jeremywrnr/homebrew-tap"
# Publish the Homebrew formula on release
publish-jobs = ["homebrew"]
# Whether to install an updater program
install-updater = false
