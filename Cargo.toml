[package]
name = "apple-to-last-fm"
version = "0.1.0"
edition = "2024"
description = "Scrobble Apple Music plays to Last.fm"
license = "MIT"

[dependencies]
apple-music = "0.11"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2.0"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = "0.3"
dirs = "5"
rustfm-scrobble = "1.1"
rpassword = "7"
